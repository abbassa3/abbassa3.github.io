<!-- #main : Zone de contenu principal (Page d'erreur 404) -->
<main id="content">
	        <h2>Contact Us</h2>
            <p class="desc" lang="ar" dir="rtl">اتصل بنا</p>
			
            <hr class="separator">

  <section class="contact-container">
    <div class="contact-header">

      <p class="contact-subtitle">Pour toute question ou suggestion, n'hésitez pas à nous écrire.</p>
    </div>

    <!-- Le formulaire est configuré pour envoyer les messages à abbassa@mail.com -->
    <form action="https://formsubmit.co/423c5dd4bc4c49b5716ab058cfe84d78" method="POST" class="contact-form">
      
      <!-- Options de configuration invisibles -->
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_subject" value="Nouveau message - Horaires de Prière">

      <!-- Ligne Nom & Email -->
      <div class="form-row">
        <div class="form-group">
          <label for="name">Nom complet / Full Name</label>
          <input type="text" id="name" name="name" required placeholder="Votre nom...">
        </div>
        <div class="form-group">
          <label for="email">Adresse Email / Email</label>
          <input type="email" id="email" name="email" required placeholder="nom@exemple.com">
        </div>
      </div>

      <!-- Ligne Sujet -->
      <div class="form-group">
        <label for="subject">Sujet / Subject</label>
        <input type="text" id="subject" name="subject" required placeholder="Le motif de votre message...">
      </div>

      <!-- Ligne Message -->
      <div class="form-group">
        <label for="message">Votre Message / Message</label>
        <textarea id="message" name="message" rows="6" required placeholder="Écrivez votre message ici..."></textarea>
      </div>

      <!-- Boutons d'action -->
      <div class="buttons-group">
        <button type="reset" class="btn-reset">
          <span>Effacer / Clear / مسح</span>
        </button>
        <button type="submit" class="btn-submit">
          <span>Envoyer / Send / إرسال</span>
        </button>
      </div>

    </form>

  <style>
/* Style de base du bouton Effacer */
.btn-reset {
    padding: 15px 35px;
    background-color: #f5f5f5;
    color: #555555;
    border: 1px solid #cccccc;
    border-radius: 4px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* Effet au survol de la souris */
.btn-reset:hover {
    background-color: #ffebee; /* Fond rouge très léger */
    color: #c62828;            /* Texte rouge foncé */
    border-color: #ef9a9a;      /* Bordure rouge adoucie */
}

/* Style du conteneur pour aligner les deux boutons */
.buttons-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 25px;
}
/* ==========================================================================
   FORMULAIRE DE CONTACT (900px maximum)
   ========================================================================== */
.main-content-contact {
  width: 100%;
  margin: 30px auto;
  box-sizing: border-box;
  padding: 0 15px;
}

.contact-container {
  background-color: #ffffff;
  padding-bottom: 10px;
}

/* EN-TÊTE DU FORMULAIRE */
.contact-header {
  text-align: center;
  margin-bottom: 35px;
  border-bottom: 1px solid #f0f0f0;
  padding-bottom: 20px;
}

.contact-subtitle {
  font-size: 14px;
  margin: 0;
}

/* STRUCTURE DES LIGNES */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px; /* Écart régulier entre les champs */
}

.form-row {
  display: flex;
  gap: 20px; /* Écart entre Nom et Email */
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px; /* Écart entre le label et son champ d'écriture */
  flex: 1;
}

/* LABELS ET CHAMPS SCRIPTURAUX */
.form-group label {
  font-size: 14px;
  font-weight: 500;
}

.form-group input,
.form-group textarea {
  font-size: 15px;
  padding: 12px;
  border: 1px solid #dcdcdc;
  border-radius: 4px;
  background-color: #fcfcfc;
  transition: all 0.2s ease-in-out;
  box-sizing: border-box;
  width: 100%;
}

/* Effet lumineux lors du clic sur un champ */
.form-group input:focus,
.form-group textarea:focus {
  outline: none;
  border-color: #0b4c8c;
  background-color: #ffffff;
  box-shadow: 0 0 0 3px rgba(11, 76, 140, 0.1);
}

/* BOUTON D'ENVOI */
.form-submit {
  text-align: right; /* Aligne le bouton vers la droite, sous l'esprit de la bannière */
  margin-top: 10px;
}

.btn-submit {
  background-color: #0b4c8c;
  color: #ffffff;
  border: none;
  padding: 14px 30px;
  font-size: 15px;
  font-weight: bold;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 6px rgba(11, 76, 140, 0.15);
}

.btn-submit:hover {
  background-color: #083868; /* Bleu légèrement plus foncé au survol */
  transform: translateY(-1px); /* Très léger effet de soulèvement */
  box-shadow: 0 6px 12px rgba(11, 76, 140, 0.2);
}

.btn-submit:active {
  transform: translateY(0);
}

/* ==========================================================================
   RESPONSIVE MOBILE FORMULAIRE
   ========================================================================== */
@media (max-width: 650px) {
  .contact-container {
    padding: 20px;
  }
  
  .form-row {
    flex-direction: column; /* Nom et Email s'empilent verticalement sur mobile */
    gap: 20px;
  }
  
  .form-submit {
    text-align: center; /* Centre le bouton sur petit écran */
  }
  
  .btn-submit {
    width: 100%; /* Le bouton prend toute la largeur sur mobile */
  }
}
</style>

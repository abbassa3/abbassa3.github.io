// Initialisation au démarrage
window.addEventListener('DOMContentLoaded', () => {
    const select = document.getElementById('wselect');
    if (select) {
        select.innerHTML = "";
        lesWilayas.forEach(w => {
            // Affiche "27 - Mostaganem | مستغانم" dans le menu déroulant
            select.add(new Option(`${w.fr} | ${w.nameAr}`, w.id));
        });
        select.value = "27"; // Mostaganem par défaut
        chargerScriptWilaya();
    }
});

// Le cœur du système : charge à la demande le fichier de la wilaya choisie
function chargerScriptWilaya() {
    const id = document.getElementById('wselect').value;
    const w = lesWilayas.find(item => item.id === id);
    if (!w) return;

    // Mise à jour bilingue des titres H2 avec les noms propres purs
    
    // Supprime l'ancien script de wilaya chargé s'il existe
    const ancienScript = document.getElementById('script-wilaya-dynamique');
    if (ancienScript) ancienScript.remove();

    // Crée une balise script dynamique (ex: "data/27.js")
    const script = document.createElement('script');
    script.id = 'script-wilaya-dynamique';
    script.src = `data/${id}.js`;
    
    // Dès que le fichier charge, on affiche son tableau
    script.onload = () => {
        document.getElementById('sinput').value = ""; // Vide la recherche précédente
        genererHtmlTableau(communesWilayaActive);
    };
    
    document.body.appendChild(script);
}

// Génère l'affichage du tableau
function genererHtmlTableau(liste) {
    const tbody = document.getElementById('tablebody');
    if (!tbody) return;
    tbody.innerHTML = "";
    
    if (!liste || liste.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888;">Mise à jour en cours.</td></tr>';
        return;
    }

    const fragment = document.createDocumentFragment(); 
    liste.forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${c.fr}</td>
            <td style="text-align: center;" class="abbassa-zip">${c.zip}</td>
            <td class="arabic-cell" dir="rtl">${c.ar}</td>
        `;
        fragment.appendChild(tr);
    });
    tbody.appendChild(fragment);
}

// Recherche instantanée en mémoire
function filtrerDonnees() {
    const valeur = document.getElementById('sinput').value.toLowerCase().trim();
    if (valeur === "") {
        genererHtmlTableau(communesWilayaActive);
        return;
    }
    
    const resultat = communesWilayaActive.filter(c => 
        c.fr.toLowerCase().includes(valeur) || 
        c.zip.includes(valeur) || 
        c.ar.includes(valeur)
    );
    genererHtmlTableau(resultat);
}
